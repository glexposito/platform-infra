name: Terragrunt Stack
description: Run Terragrunt init and plan, with optional apply

inputs:
  working-directory:
    description: Directory containing the Terragrunt stack
    required: true
  azure-client-id:
    description: Azure OIDC client ID
    required: true
  azure-tenant-id:
    description: Azure tenant ID
    required: true
  azure-subscription-id:
    description: Azure subscription ID
    required: true
  terraform-version:
    description: Terraform version to install
    required: true
  terragrunt-version:
    description: Terragrunt version to install
    required: true
  run-apply:
    description: Whether to run terragrunt apply after plan
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Azure login
      uses: azure/login@v2.3.0
      with:
        client-id: ${{ inputs.azure-client-id }}
        tenant-id: ${{ inputs.azure-tenant-id }}
        subscription-id: ${{ inputs.azure-subscription-id }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4.0.0
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Setup Terragrunt
      uses: jdx/mise-action@v4.0.0
      with:
        version: 2026.3.9
        tool_versions: |
          terragrunt ${{ inputs.terragrunt-version }}

    - name: Terragrunt init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terragrunt init

    - name: Terragrunt plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terragrunt plan -no-color

    - name: Terragrunt apply
      if: ${{ inputs.run-apply == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: terragrunt apply -auto-approve -no-color
