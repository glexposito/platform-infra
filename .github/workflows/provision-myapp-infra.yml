name: Provision My App Infra

on:
  pull_request:
    paths:
      - ".github/workflows/provision-myapp-infra.yml"
      - "terragrunt.hcl"
      - "modules/**"
      - "live/**"
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated environments: dev, stg, prod-aue, prod-sea"
        required: true
        type: string
        default: "dev"
      command:
        description: "Terragrunt command"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

jobs:
  prepare-deployment:
    if: github.event_name == 'workflow_dispatch'
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      display: ${{ steps.resolve.outputs.display }}
    steps:
      - name: Resolve targets
        id: resolve
        env:
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_COMMAND: ${{ inputs.command }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          raw = os.environ["INPUT_TARGETS"]
          command = os.environ["INPUT_COMMAND"]
          allowed = ["dev", "stg", "prod-aue", "prod-sea"]

          parts = [p.strip() for p in raw.split(",") if p.strip()]
          if not parts:
            print("No environments provided.", file=sys.stderr)
            sys.exit(1)

          invalid = [p for p in parts if p not in allowed]
          if invalid:
            print(f"Invalid environments: {', '.join(invalid)}", file=sys.stderr)
            sys.exit(1)

          ordered = []
          for env in allowed:
            if env in parts and not any(o['environment'] == env for o in ordered):
              if env == 'prod-aue':
                ordered.append({
                  'environment': 'prod-aue',
                  'platform_working_dir': 'live/prod/australiaeast/prod/env-platform',
                  'app_working_dir': 'live/prod/australiaeast/prod/myapp',
                })
              elif env == 'prod-sea':
                ordered.append({
                  'environment': 'prod-sea',
                  'platform_working_dir': 'live/prod/southeastasia/prod/env-platform',
                  'app_working_dir': 'live/prod/southeastasia/prod/myapp',
                })
              elif env == 'stg':
                ordered.append({
                  'environment': 'stg',
                  'platform_working_dir': 'live/non-prod/australiaeast/stg/env-platform',
                  'app_working_dir': 'live/non-prod/australiaeast/stg/myapp',
                })
              else:
                ordered.append({
                  'environment': 'dev',
                  'platform_working_dir': 'live/non-prod/australiaeast/dev/env-platform',
                  'app_working_dir': 'live/non-prod/australiaeast/dev/myapp',
                })

          if command == "apply" and any(o['environment'].startswith('prod') for o in ordered) and len(ordered) > 1:
            print("Refusing to apply prod together with other environments.", file=sys.stderr)
            sys.exit(1)

          display_names = [o['environment'] for o in ordered]
          print(f"matrix={json.dumps(ordered)}")
          print(f"display={','.join(display_names)}")
          PY

  plan-platform:
    if: github.event_name == 'pull_request'
    name: Plan Platform (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            working_dir: live/non-prod/australiaeast/dev/env-platform
          - environment: stg
            working_dir: live/non-prod/australiaeast/stg/env-platform
          - environment: prod-aue
            working_dir: live/prod/australiaeast/prod/env-platform
          - environment: prod-sea
            working_dir: live/prod/southeastasia/prod/env-platform
    concurrency:
      group: platform-plan-${{ matrix.environment }}
      cancel-in-progress: true
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TG_STATE_RESOURCE_GROUP: ${{ vars.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ vars.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER: ${{ vars.TG_STATE_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Terragrunt
        uses: ./.github/actions/terragrunt-stack
        with:
          working-directory: ${{ matrix.working_dir }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          terraform-version: ${{ vars.TERRAFORM_VERSION || '1.14.7' }}
          terragrunt-version: ${{ vars.TERRAGRUNT_VERSION || '0.99.4' }}

  plan-app:
    if: github.event_name == 'pull_request'
    name: Plan My App (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            working_dir: live/non-prod/australiaeast/dev/myapp
          - environment: stg
            working_dir: live/non-prod/australiaeast/stg/myapp
          - environment: prod-aue
            working_dir: live/prod/australiaeast/prod/myapp
          - environment: prod-sea
            working_dir: live/prod/southeastasia/prod/myapp
    concurrency:
      group: myapp-plan-${{ matrix.environment }}
      cancel-in-progress: true
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TG_STATE_RESOURCE_GROUP: ${{ vars.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ vars.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER: ${{ vars.TG_STATE_CONTAINER }}
      MYAPP_IMAGE: ${{ vars.MYAPP_IMAGE }}
      MYAPP_REGISTRY_SERVER: ${{ vars.MYAPP_REGISTRY_SERVER }}
      MYAPP_ACR_ID: ${{ vars.MYAPP_ACR_ID }}
      STATUSPAGE_API_KEY: ${{ secrets.STATUSPAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Run Terragrunt
        uses: ./.github/actions/terragrunt-stack
        with:
          working-directory: ${{ matrix.working_dir }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          terraform-version: ${{ vars.TERRAFORM_VERSION || '1.14.7' }}
          terragrunt-version: ${{ vars.TERRAGRUNT_VERSION || '0.99.4' }}

  deploy-platform:
    if: github.event_name == 'workflow_dispatch'
    needs: prepare-deployment
    name: Deploy Platform (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-deployment.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: platform-deploy-${{ matrix.environment }}
      cancel-in-progress: false
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TG_STATE_RESOURCE_GROUP: ${{ vars.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ vars.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER: ${{ vars.TG_STATE_CONTAINER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Show deployment targets
        run: echo "Running ${{ inputs.command }} for ${{ needs.prepare-deployment.outputs.display }}"

      - name: Run Terragrunt
        uses: ./.github/actions/terragrunt-stack
        with:
          working-directory: ${{ matrix.platform_working_dir }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          terraform-version: ${{ vars.TERRAFORM_VERSION || '1.14.7' }}
          terragrunt-version: ${{ vars.TERRAGRUNT_VERSION || '0.99.4' }}
          run-apply: ${{ inputs.command == 'apply' }}

  deploy-app:
    if: github.event_name == 'workflow_dispatch'
    needs:
      - prepare-deployment
      - deploy-platform
    name: Deploy My App (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-deployment.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: myapp-deploy-${{ matrix.environment }}
      cancel-in-progress: false
    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      TG_STATE_RESOURCE_GROUP: ${{ vars.TG_STATE_RESOURCE_GROUP }}
      TG_STATE_STORAGE_ACCOUNT: ${{ vars.TG_STATE_STORAGE_ACCOUNT }}
      TG_STATE_CONTAINER: ${{ vars.TG_STATE_CONTAINER }}
      MYAPP_IMAGE: ${{ vars.MYAPP_IMAGE }}
      MYAPP_REGISTRY_SERVER: ${{ vars.MYAPP_REGISTRY_SERVER }}
      MYAPP_ACR_ID: ${{ vars.MYAPP_ACR_ID }}
      STATUSPAGE_API_KEY: ${{ secrets.STATUSPAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Show deployment targets
        run: echo "Running ${{ inputs.command }} for ${{ needs.prepare-deployment.outputs.display }}"

      - name: Run Terragrunt
        uses: ./.github/actions/terragrunt-stack
        with:
          working-directory: ${{ matrix.app_working_dir }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          terraform-version: ${{ vars.TERRAFORM_VERSION || '1.14.7' }}
          terragrunt-version: ${{ vars.TERRAGRUNT_VERSION || '0.99.4' }}
          run-apply: ${{ inputs.command == 'apply' }}
