name: Provision My App Infra

on:
  pull_request:
    paths:
      - ".github/workflows/provision-myapp-infra.yml"
      - "terragrunt.hcl"
      - "modules/**"
      - "live/**"
  workflow_dispatch:
    inputs:
      targets:
        description: "Comma-separated environments: dev, prod-weu"
        required: true
        type: string
        default: "dev"
      command:
        description: "Terragrunt command"
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

env:
  TERRAFORM_VERSION: "1.14.7"
  TERRAGRUNT_VERSION: "0.99.4"

jobs:
  prepare-deployment:
    if: github.event_name == 'workflow_dispatch'
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      display: ${{ steps.resolve.outputs.display }}
    steps:
      - name: Resolve targets
        id: resolve
        env:
          INPUT_TARGETS: ${{ inputs.targets }}
          INPUT_COMMAND: ${{ inputs.command }}
        run: |
          python3 <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import sys

          raw = os.environ["INPUT_TARGETS"]
          command = os.environ["INPUT_COMMAND"]
          allowed = ["dev", "prod-weu"]

          parts = [p.strip() for p in raw.split(",") if p.strip()]
          if not parts:
            print("No environments provided.", file=sys.stderr)
            sys.exit(1)

          invalid = [p for p in parts if p not in allowed]
          if invalid:
            print(f"Invalid environments: {', '.join(invalid)}", file=sys.stderr)
            sys.exit(1)

          ordered = []
          for env in allowed:
            if env in parts and not any(o['environment'] == env for o in ordered):
              if env == 'prod-weu':
                ordered.append({'environment': 'prod-weu', 'working_dir': 'live/prod/westeurope/prod'})
              else:
                ordered.append({'environment': 'dev', 'working_dir': 'live/non-prod/westeurope/dev'})

          if command == "apply" and any(o['environment'].startswith('prod') for o in ordered) and len(ordered) > 1:
            print("Refusing to apply prod together with other environments.", file=sys.stderr)
            sys.exit(1)

          display_names = [o['environment'] for o in ordered]
          print(f"matrix={json.dumps(ordered)}")
          print(f"display={','.join(display_names)}")
          PY

  plan:
    if: github.event_name == 'pull_request'
    name: Plan My App (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            working_dir: live/non-prod/westeurope/dev
          - environment: prod-weu
            working_dir: live/prod/westeurope/prod
    environment: ${{ matrix.environment }}
    concurrency:
      group: myapp-plan-${{ matrix.environment }}
      cancel-in-progress: true
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.working_dir }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      STATUSPAGE_API_KEY: ${{ secrets.STATUSPAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terragrunt
        uses: jdx/mise-action@v4.0.0
        with:
          version: 2026.3.9
          tool_versions: |
            terragrunt ${{ env.TERRAGRUNT_VERSION }}

      - name: Terragrunt stack generate
        run: terragrunt stack generate

      - name: Terragrunt init
        run: terragrunt run --all --non-interactive init

      - name: Terragrunt plan
        run: terragrunt run --all --non-interactive plan -- -no-color

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: prepare-deployment
    name: Deploy My App (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare-deployment.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    concurrency:
      group: myapp-deploy-${{ matrix.environment }}
      cancel-in-progress: false
    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.working_dir }}
    env:
      ARM_USE_OIDC: true
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      STATUSPAGE_API_KEY: ${{ secrets.STATUSPAGE_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Show deployment targets
        run: echo "Running ${{ inputs.command }} for ${{ needs.prepare-deployment.outputs.display }}"

      - name: Azure login
        uses: azure/login@v2.3.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4.0.0
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terragrunt
        uses: jdx/mise-action@v4.0.0
        with:
          version: 2026.3.9
          tool_versions: |
            terragrunt ${{ env.TERRAGRUNT_VERSION }}

      - name: Terragrunt stack generate
        run: terragrunt stack generate

      - name: Terragrunt init
        run: terragrunt run --all --non-interactive init

      - name: Terragrunt plan
        run: terragrunt run --all --non-interactive plan -- -no-color

      - name: Terragrunt apply
        if: inputs.command == 'apply'
        run: terragrunt run --all --non-interactive apply -- -auto-approve -no-color
